name: Bug Report
description: Report a bug
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: "Thank you for reporting a bug. Please fill out the form below."
  - type: input
    id: service
    attributes:
      label: Affected Service
      description: Which microservice is affected?
      options:
        - auth-api
        - face-ml
        - zk-proofs
        - quantum-rng
        - quantum-key-exchange
        - quantum-ml
        - pqc-crypto
        - cache-store
        - vector-db
        - edge-gateway
        - other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - critical
        - high
        - medium
        - low
    validations:
      required: true

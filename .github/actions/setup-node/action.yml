name: Setup Node.js
description: Setup Node.js with npm caching
inputs:
  node-version:
    description: Node.js version
    required: false
    default: '22'
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: services/edge-gateway/package-lock.json

name: Protobuf CI

on:
  push:
    branches: [main, develop]
    paths: ['proto/**']
  pull_request:
    branches: [main]
    paths: ['proto/**']

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
      - run: buf lint proto/
      - run: buf generate proto/ --template proto/buf.gen.yaml --output gen/

  breaking:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-setup-action@v1
      - run: buf breaking --against 'https://github.com/${{ github.repository }}.git#branch=main'

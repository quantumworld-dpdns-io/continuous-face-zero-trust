name: CI - Robot Framework

on:
  push:
    branches: [main, develop]
    paths:
      - "tests/robot/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "tests/robot/**"
  schedule:
    - cron: "0 2 * * 1"

env:
  PYTHON_VERSION: "3.12"
  RF_VERSION: "6.1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install robotframework-tidy
      - name: Check formatting
        run: robotframework-tidy --check tests/robot/

  test-functional:
    name: Functional Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install robotframework==${{ env.RF_VERSION }}
          pip install -r tests/robot/requirements.txt
      - name: Run functional tests
        run: |
          robot --outputdir reports/functional tests/robot/functional/
      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rf-functional-reports
          path: reports/functional/

  test-performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install robotframework==${{ env.RF_VERSION }}
          pip install -r tests/robot/requirements.txt
      - name: Run performance tests
        run: |
          robot --outputdir reports/performance tests/robot/performance/
      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rf-performance-reports
          path: reports/performance/

  test-security:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install robotframework==${{ env.RF_VERSION }}
          pip install -r tests/robot/requirements.txt
      - name: Run security tests
        run: |
          robot --outputdir reports/security tests/robot/security/
      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rf-security-reports
          path: reports/security/

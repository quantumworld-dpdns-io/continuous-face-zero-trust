name: CI - TypeScript Services

on:
  push:
    branches: [main, develop]
    paths:
      - "services/edge-gateway/**"
      - "services/vector-db/**"
      - "services/cache-store/**"
      - "packages/javascript/**"
      - "tests/typescript/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "services/edge-gateway/**"
      - "services/vector-db/**"
      - "services/cache-store/**"
      - "packages/javascript/**"
      - "tests/typescript/**"

env:
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
        working-directory: packages/javascript
      - name: Run eslint
        run: npm run lint
        working-directory: packages/javascript
      - name: Run typecheck
        run: npx tsc --noEmit
        working-directory: packages/javascript

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
        working-directory: packages/javascript
      - name: Run tests
        run: npm test -- --coverage
        working-directory: packages/javascript
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: packages/javascript/coverage/lcov.info
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
        working-directory: packages/javascript
      - name: Build
        run: npm run build
        working-directory: packages/javascript
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: js-package
          path: packages/javascript/dist/

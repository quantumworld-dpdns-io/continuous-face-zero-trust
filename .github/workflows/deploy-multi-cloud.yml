name: Deploy - Multi-Cloud

on:
  workflow_dispatch:
    inputs:
      cloud:
        description: "Cloud provider"
        required: true
        type: choice
        options:
          - all
          - aws
          - gcp
          - azure
      service:
        description: "Service to deploy"
        required: true
        type: choice
        options:
          - all
          - auth-service
          - face-ml-service
          - edge-gateway
      version:
        description: "Version tag"
        required: true
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  deploy-aws:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    if: inputs.cloud == 'all' || inputs.cloud == 'aws'
    environment: aws-production
    concurrency: aws-deploy
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name cfzt-aws-prod --region us-east-1

      - name: Deploy to EKS
        run: |
          helm upgrade --install cfzt ./packages/helm \
            --namespace cfzt-production \
            --values ./packages/helm/values-aws.yaml \
            --set image.tag=${{ inputs.version }} \
            --wait --timeout 600s

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/auth-service -n cfzt-production --timeout=600s

  deploy-gcp:
    name: Deploy to GCP
    runs-on: ubuntu-latest
    if: inputs.cloud == 'all' || inputs.cloud == 'gcp'
    environment: gcp-production
    concurrency: gcp-deploy
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: cfzt-gcp-prod
          location: us-central1

      - name: Deploy to GKE
        run: |
          helm upgrade --install cfzt ./packages/helm \
            --namespace cfzt-production \
            --values ./packages/helm/values-gcp.yaml \
            --set image.tag=${{ inputs.version }} \
            --wait --timeout 600s

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/auth-service -n cfzt-production --timeout=600s

  deploy-azure:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    if: inputs.cloud == 'all' || inputs.cloud == 'azure'
    environment: azure-production
    concurrency: azure-deploy
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          cluster-name: cfzt-azure-prod
          resource-group: cfzt-rg

      - name: Deploy to AKS
        run: |
          helm upgrade --install cfzt ./packages/helm \
            --namespace cfzt-production \
            --values ./packages/helm/values-azure.yaml \
            --set image.tag=${{ inputs.version }} \
            --wait --timeout 600s

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/auth-service -n cfzt-production --timeout=600s

  verify-multi-cloud:
    name: Verify Multi-Cloud
    runs-on: ubuntu-latest
    needs: [deploy-aws, deploy-gcp, deploy-azure]
    if: always()
    steps:
      - name: Run cross-cloud health checks
        run: |
          echo "Running multi-cloud health verification..."
          curl -sf https://api.cfzt.io/health || exit 1
          curl -sf https://api-us-east-1.cfzt.io/health || exit 1
          curl -sf https://api-us-central1.cfzt.io/health || exit 1
          curl -sf https://api-eastus.cfzt.io/health || exit 1

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Multi-cloud deployment ${{ job.status }} for version ${{ inputs.version }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Multi-cloud deployment ${{ job.status }}\n*Cloud:* ${{ inputs.cloud }}\n*Version:* ${{ inputs.version }}\n*Actor:* ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

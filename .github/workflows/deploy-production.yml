name: Deploy - Production

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy"
        required: true
        type: choice
        options:
          - all
          - auth-service
          - face-ml-service
          - quantum-rng
          - pqc-crypto
          - zk-proofs
          - edge-gateway
          - vector-db
          - cache-store
          - analytics
      version:
        description: "Version tag to deploy"
        required: true
        type: string

env:
  CLUSTER_NAME: cfzt-production
  NAMESPACE: cfzt-production
  REGISTRY: ghcr.io

jobs:
  pre-deploy-checks:
    name: Pre-deploy Checks
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Verify image exists
        run: |
          docker manifest inspect ${{ env.REGISTRY }}/cfzt/${{ inputs.service }}:${{ inputs.version }}

      - name: Run security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/cfzt/${{ inputs.service }}:${{ inputs.version }}
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Check changelog
        run: |
          echo "Verifying changelog for version ${{ inputs.version }}"
          test -f CHANGELOG.md

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: pre-deploy-checks
    environment: production
    concurrency: production-deploy
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region us-east-1

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Deploy with Helm
        run: |
          helm upgrade --install cfzt ./packages/helm \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --values ./packages/helm/values-production.yaml \
            --set image.tag=${{ inputs.version }} \
            --wait --timeout 600s

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/auth-service -n ${{ env.NAMESPACE }} --timeout=600s
          kubectl rollout status deployment/face-ml-service -n ${{ env.NAMESPACE }} --timeout=600s
          kubectl rollout status deployment/edge-gateway -n ${{ env.NAMESPACE }} --timeout=600s

      - name: Run smoke tests
        run: |
          python tests/smoke/test_production.py --base-url https://api.cfzt.io

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Production deployment ${{ job.status }} for ${{ inputs.service }}:${{ inputs.version }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Production deployment ${{ job.status }}\n*Service:* ${{ inputs.service }}\n*Version:* ${{ inputs.version }}\n*Actor:* ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

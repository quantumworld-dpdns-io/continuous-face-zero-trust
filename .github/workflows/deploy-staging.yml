name: Deploy - Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy"
        required: true
        type: choice
        options:
          - all
          - auth-service
          - face-ml-service
          - quantum-rng
          - pqc-crypto
          - zk-proofs
          - edge-gateway
          - vector-db
          - cache-store
          - analytics

env:
  CLUSTER_NAME: cfzt-staging
  NAMESPACE: cfzt-staging
  REGISTRY: ghcr.io

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    concurrency: staging-deploy
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STAGING }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STAGING }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region us-east-1

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Deploy with Helm
        run: |
          helm upgrade --install cfzt ./packages/helm \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --values ./packages/helm/values-staging.yaml \
            --set image.tag=${{ github.sha }} \
            --wait --timeout 300s

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/auth-service -n ${{ env.NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/face-ml-service -n ${{ env.NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/edge-gateway -n ${{ env.NAMESPACE }} --timeout=300s

      - name: Run smoke tests
        run: |
          python tests/smoke/test_staging.py --base-url https://staging.cfzt.io

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Staging deployment ${{ job.status }} for ${{ github.event.inputs.service || 'all' }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Staging deployment ${{ job.status }}\n*Service:* ${{ github.event.inputs.service || 'all' }}\n*Commit:* ${{ github.sha }}\n*Actor:* ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

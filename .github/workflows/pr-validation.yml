name: PR Validation

on:
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  GO_VERSION: "1.21"
  RUST_VERSION: "1.75"

jobs:
  pr-title:
    name: PR Title Check
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false

  pr-size:
    name: PR Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check PR size
        run: |
          ADDITIONS=${{ github.event.pull_request.additions }}
          DELETIONS=${{ github.event.pull_request.deletions }}
          TOTAL=$((ADDITIONS + DELETIONS))
          echo "Additions: $ADDITIONS"
          echo "Deletions: $DELETIONS"
          echo "Total changes: $TOTAL"
          if [ $TOTAL -gt 1000 ]; then
            echo "::warning::Large PR detected ($TOTAL lines changed). Consider breaking into smaller PRs."
          fi

  pr-labels:
    name: PR Labels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check labels
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const requiredLabels = ['size/S', 'size/M', 'size/L', 'size/XL'];
            const hasSizeLabel = pr.labels.some(l => requiredLabels.includes(l.name));
            if (!hasSizeLabel) {
              core.warning('PR does not have a size label');
            }

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      rust: ${{ steps.filter.outputs.rust }}
      typescript: ${{ steps.filter.outputs.typescript }}
      go: ${{ steps.filter.outputs.go }}
      robot: ${{ steps.filter.outputs.robot }}
      docs: ${{ steps.filter.outputs.docs }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            python:
              - 'services/auth/**'
              - 'services/face-ml/**'
              - 'services/analytics/**'
              - 'packages/python/**'
            rust:
              - 'services/quantum-rng/**'
              - 'services/pqc-crypto/**'
              - 'packages/rust/**'
            typescript:
              - 'services/edge-gateway/**'
              - 'services/vector-db/**'
              - 'services/cache-store/**'
              - 'packages/javascript/**'
            go:
              - 'services/zk-proofs/**'
              - 'packages/go/**'
            robot:
              - 'tests/robot/**'
            docs:
              - 'docs/**'
            infra:
              - 'infrastructure/**'
              - 'packages/helm/**'

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Run Python tests
        run: |
          pip install -e "packages/python[dev]"
          pytest tests/python/ -v

  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run Rust tests
        run: cargo test --all-features

  typescript-tests:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run TypeScript tests
        run: |
          cd packages/javascript
          npm ci
          npm test

  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run Go tests
        run: go test -v ./...

  docs-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Check docs links
        run: |
          echo "Checking documentation links..."
          for doc in docs/**/*.md; do
            echo "Checking $doc..."
            grep -oP 'https?://[^\s\)]+' "$doc" | while read url; do
              curl -sf "$url" > /dev/null || echo "Warning: Broken link in $doc: $url"
            done
          done

  infra-check:
    name: Infrastructure Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Validate Terraform
        run: |
          cd infrastructure/
          terraform fmt -check
          terraform validate
      - name: Lint Helm
        run: |
          helm lint packages/helm/

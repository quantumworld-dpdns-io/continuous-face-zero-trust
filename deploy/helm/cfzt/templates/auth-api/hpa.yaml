{{- if .Values.authApi.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "cfzt.fullname" . }}-auth-api
  namespace: {{ include "cfzt.namespace" . }}
  labels:
    {{- include "cfzt.labels" . | nindent 4 }}
    app.kubernetes.io/component: authentication
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "cfzt.fullname" . }}-auth-api
  minReplicas: {{ .Values.authApi.autoscaling.minReplicas | default 2 }}
  maxReplicas: {{ .Values.authApi.autoscaling.maxReplicas | default 10 }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.authApi.autoscaling.targetCPU | default 70 }}
    {{- if .Values.authApi.autoscaling.targetMemory }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.authApi.autoscaling.targetMemory }}
    {{- end }}
{{- end }}

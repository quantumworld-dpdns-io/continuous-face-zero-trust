apiVersion: v1
kind: Service
metadata:
  name: {{ include "cfzt.fullname" . }}-auth-api
  namespace: {{ include "cfzt.namespace" . }}
  labels:
    {{- include "cfzt.labels" . | nindent 4 }}
    app.kubernetes.io/component: authentication
spec:
  type: {{ .Values.authApi.service.type | default "ClusterIP" }}
  selector:
    {{- include "cfzt.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: authentication
  ports:
    - name: http
      port: {{ .Values.authApi.service.port | default 8000 }}
      targetPort: http
      protocol: TCP
    - name: grpc
      port: {{ .Values.authApi.grpc.port | default 50051 }}
      targetPort: grpc
      protocol: TCP

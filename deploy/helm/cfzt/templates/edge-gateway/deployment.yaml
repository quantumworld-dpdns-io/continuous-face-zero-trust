apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cfzt.fullname" . }}-edge-gateway
  namespace: {{ include "cfzt.namespace" . }}
  labels:
    {{- include "cfzt.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-gateway
spec:
  replicas: {{ .Values.edgeGateway.replicas | default 2 }}
  selector:
    matchLabels:
      {{- include "cfzt.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api-gateway
  template:
    metadata:
      labels:
        {{- include "cfzt.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: edge-gateway
          image: "{{ .Values.edgeGateway.image.repository }}:{{ .Values.edgeGateway.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.edgeGateway.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ .Values.edgeGateway.containerPort | default 8787 }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "cfzt.fullname" . }}-edge-gateway-config
          {{- with .Values.edgeGateway.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.edgeGateway.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

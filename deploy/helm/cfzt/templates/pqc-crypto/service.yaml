apiVersion: v1
kind: Service
metadata:
  name: {{ include "cfzt.fullname" . }}-pqc-crypto
  namespace: {{ include "cfzt.namespace" . }}
  labels:
    {{- include "cfzt.labels" . | nindent 4 }}
    app.kubernetes.io/component: post-quantum-crypto
spec:
  type: {{ .Values.pqcCrypto.service.type | default "ClusterIP" }}
  selector:
    {{- include "cfzt.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: post-quantum-crypto
  ports:
    - name: http
      port: {{ .Values.pqcCrypto.service.port | default 8006 }}
      targetPort: http
      protocol: TCP
    - name: grpc
      port: {{ .Values.pqcCrypto.grpc.port | default 50055 }}
      targetPort: grpc
      protocol: TCP

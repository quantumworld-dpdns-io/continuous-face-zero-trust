apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics
  namespace: cfzt
  labels:
    app: analytics
    component: analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics
  template:
    metadata:
      labels:
        app: analytics
        component: analytics
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: analytics
          image: cfzt/analytics:latest
          ports:
            - name: http
              containerPort: 8009
              protocol: TCP
          envFrom:
            - configMapRef:
                name: analytics-config
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8009
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8009
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

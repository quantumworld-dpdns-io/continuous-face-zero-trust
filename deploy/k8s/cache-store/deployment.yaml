apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache-store
  namespace: cfzt
  labels:
    app: cache-store
    component: caching
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cache-store
  template:
    metadata:
      labels:
        app: cache-store
        component: caching
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: cache-store
          image: cfzt/cache-store:latest
          ports:
            - name: http
              containerPort: 8007
              protocol: TCP
          envFrom:
            - configMapRef:
                name: cache-store-config
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8007
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8007
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

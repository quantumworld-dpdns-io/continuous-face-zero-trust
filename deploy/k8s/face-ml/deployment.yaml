apiVersion: apps/v1
kind: Deployment
metadata:
  name: face-ml
  namespace: cfzt
  labels:
    app: face-ml
    component: ml-inference
spec:
  replicas: 2
  selector:
    matchLabels:
      app: face-ml
  template:
    metadata:
      labels:
        app: face-ml
        component: ml-inference
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: face-ml
          image: cfzt/face-ml:latest
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
            - name: grpc
              containerPort: 50052
              protocol: TCP
          envFrom:
            - configMapRef:
                name: face-ml-config
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
              # nvidia.com/gpu: "1"  # Uncomment for GPU nodes
            limits:
              cpu: 2000m
              memory: 2Gi
              # nvidia.com/gpu: "1"  # Uncomment for GPU nodes
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

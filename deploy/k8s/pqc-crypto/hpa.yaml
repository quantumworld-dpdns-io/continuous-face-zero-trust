apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pqc-crypto
  namespace: cfzt
  labels:
    app: pqc-crypto
    component: post-quantum-crypto
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pqc-crypto
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

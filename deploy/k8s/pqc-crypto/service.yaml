apiVersion: v1
kind: Service
metadata:
  name: pqc-crypto
  namespace: cfzt
  labels:
    app: pqc-crypto
    component: post-quantum-crypto
spec:
  type: ClusterIP
  selector:
    app: pqc-crypto
  ports:
    - name: http
      port: 8006
      targetPort: 8006
      protocol: TCP
    - name: grpc
      port: 50055
      targetPort: 50055
      protocol: TCP

apiVersion: apps/v1
kind: Deployment
metadata:
  name: quantum-rng
  namespace: cfzt
  labels:
    app: quantum-rng
    component: randomness
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quantum-rng
  template:
    metadata:
      labels:
        app: quantum-rng
        component: randomness
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: quantum-rng
          image: cfzt/quantum-rng:latest
          ports:
            - name: http
              containerPort: 8003
              protocol: TCP
          envFrom:
            - configMapRef:
                name: quantum-rng-config
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8003
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

apiVersion: apps/v1
kind: Deployment
metadata:
  name: vector-db
  namespace: cfzt
  labels:
    app: vector-db
    component: vector-database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vector-db
  template:
    metadata:
      labels:
        app: vector-db
        component: vector-database
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: vector-db
          image: cfzt/vector-db:latest
          ports:
            - name: http
              containerPort: 8008
              protocol: TCP
          envFrom:
            - configMapRef:
                name: vector-db-config
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8008
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8008
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

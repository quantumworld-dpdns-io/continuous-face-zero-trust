openapi: 3.1.0
info:
  title: Cache Store Service API
  description: Cache Store API for CFZT system
  version: 1.0.0
  contact:
    name: API Support
    email: api@cfzt.io

servers:
  - url: https://api.cfzt.io
    description: Production server
  - url: https://staging-api.cfzt.io
    description: Staging server
  - url: http://localhost:8092
    description: Local development server

paths:
  /api/v1/cache/get:
    post:
      summary: Get cache value
      description: Get value from cache
      operationId: getCache
      tags:
        - Cache
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetRequest'
      responses:
        '200':
          description: Value retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/cache/set:
    post:
      summary: Set cache value
      description: Set value in cache
      operationId: setCache
      tags:
        - Cache
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetRequest'
      responses:
        '200':
          description: Value set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/cache/delete:
    post:
      summary: Delete cache value
      description: Delete value from cache
      operationId: deleteCache
      tags:
        - Cache
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteRequest'
      responses:
        '200':
          description: Value deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/cache/pubsub/publish:
    post:
      summary: Publish message
      description: Publish message to channel
      operationId: publish
      tags:
        - PubSub
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishRequest'
      responses:
        '200':
          description: Message published
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/cache/pubsub/subscribe:
    post:
      summary: Subscribe to channel
      description: Subscribe to channel
      operationId: subscribe
      tags:
        - PubSub
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscribeRequest'
      responses:
        '200':
          description: Subscribed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscribeResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    GetRequest:
      type: object
      required:
        - key
      properties:
        key:
          type: string
          description: Cache key

    GetResponse:
      type: object
      properties:
        found:
          type: boolean
          description: Whether key was found
        value:
          type: string
          description: Cached value
        ttl:
          type: integer
          description: Time to live in seconds

    SetRequest:
      type: object
      required:
        - key
        - value
      properties:
        key:
          type: string
          description: Cache key
        value:
          type: string
          description: Value to cache
        ttl:
          type: integer
          description: Time to live in seconds
          default: 300

    SetResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Set successful

    DeleteRequest:
      type: object
      required:
        - key
      properties:
        key:
          type: string
          description: Cache key

    DeleteResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Delete successful

    PublishRequest:
      type: object
      required:
        - channel
        - message
      properties:
        channel:
          type: string
          description: Channel name
        message:
          type: string
          description: Message to publish

    PublishResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Publish successful
        subscribers:
          type: integer
          description: Number of subscribers notified

    SubscribeRequest:
      type: object
      required:
        - channel
      properties:
        channel:
          type: string
          description: Channel name
        timeout:
          type: integer
          description: Timeout in seconds
          default: 30

    SubscribeResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            type: string
          description: Received messages

    Error:
      type: object
      properties:
        code:
          type: string
          description: Error code
        message:
          type: string
          description: Error message
        details:
          type: object
          description: Error details

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus-server.monitoring.svc.cluster.local:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      httpMethod: POST
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: jaeger
      customQueryParameters: "max_source_duration=30s"
    secureJsonData: {}
    version: 1
    uid: prometheus

  - name: Loki
    type: loki
    access: proxy
    url: http://loki.monitoring.svc.cluster.local:3100
    isDefault: false
    editable: true
    jsonData:
      derivedFields:
        - datasourceUid: jaeger
          matcherRegex: "traceID=(\\w+)"
          name: TraceID
          url: "$${__value.raw}"
      maxLines: 1000
      timeout: 60
      limit: 1000
    secureJsonData: {}
    version: 1
    uid: loki

  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger-query.monitoring.svc.cluster.local:16686
    isDefault: false
    editable: true
    jsonData:
      tracesToLogs:
        datasourceUid: loki
        filterByTraceID: true
        filterBySpanID: true
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
      tracesToMetrics:
        datasourceUid: prometheus
        queries:
          - name: "Request rate"
            query: "sum(rate(http_server_request_duration_seconds_count{$$__tags}[5m]))"
          - name: "Error rate"
            query: "sum(rate(http_server_request_duration_seconds_count{$$__tags,http_status_code=~\"5..\"}[5m]))"
          - name: "Duration 95th percentile"
            query: "histogram_quantile(0.95, sum(rate(http_server_request_duration_seconds_bucket{$$__tags}[5m])) by (le))"
        defaultDuration: "1h"
      nodeGraph:
        enabled: true
      traceQuery:
        timeShiftEnabled: true
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
    secureJsonData: {}
    version: 1
    uid: jaeger

  - name: AlertManager
    type: alertmanager
    access: proxy
    url: http://alertmanager.monitoring.svc.cluster.local:9093
    isDefault: false
    editable: true
    jsonData:
      implementation: prometheus
      httpMethod: POST
      handleGrafanaManagedAlerts: true
    secureJsonData: {}
    version: 1
    uid: alertmanager

  - name: Pyroscope
    type: grafana-pyroscope-datasource
    access: proxy
    url: http://pyroscope.monitoring.svc.cluster.local:4040
    isDefault: false
    editable: true
    jsonData:
      applicationName: cfzt
      basicAuthPassword: ""
      basicAuthUser: ""
      forwardContext: false
      spanScope: ""
      httpMethod: POST
    secureJsonData: {}
    version: 1
    uid: pyroscope

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo.monitoring.svc.cluster.local:3100
    isDefault: false
    editable: true
    jsonData:
      tracesToLogs:
        datasourceUid: loki
        filterByTraceID: true
        filterBySpanID: true
      tracesToMetrics:
        datasourceUid: prometheus
        queries:
          - name: "Request rate"
            query: "sum(rate(http_server_request_duration_seconds_count{$$__tags}[5m]))"
          - name: "Error rate"
            query: "sum(rate(http_server_request_duration_seconds_count{$$__tags,http_status_code=~\"5..\"}[5m]))"
        defaultDuration: "1h"
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      search:
        hide: false
      traceQuery:
        timeShiftEnabled: true
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
      lokiSearch:
        datasourceUid: loki
      metricsBrowser:
        enabled: true
    secureJsonData: {}
    version: 1
    uid: tempo

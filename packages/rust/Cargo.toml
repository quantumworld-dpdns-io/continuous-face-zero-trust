[package]
name = "cfzt-rust-sdk"
version = "1.0.0"
edition = "2021"
authors = ["CFZT Team <team@cfzt.io>"]
description = "Continuous Face Zero Trust Rust SDK"
license = "MIT"
repository = "https://github.com/cfzt/continuous-face-zero-trust"
keywords = ["zero-trust", "face-recognition", "post-quantum-cryptography", "quantum-resistant", "authentication"]
categories = ["cryptography", "authentication", "security"]

[dependencies]
reqwest = { version = "0.11", features = ["json", "rustls-tls"], default-features = false }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
base64 = "0.21"
sha2 = "0.10"
rand = "0.8"
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
tokio-test = "0.4"
mockall = "0.11"
criterion = { version = "0.5", features = ["html_reports"] }
proptest = "1"

[build-dependencies]
cbindgen = "0.24"

[features]
default = ["reqwest/native-tls"]
native-tls = ["reqwest/native-tls"]
rustls = ["reqwest/rustls-tls"]
python = ["pyo3"]

[[bench]]
name = "crypto_bench"
harness = false

[[bench]]
name = "face_embed_bench"
harness = false

[lib]
name = "cfzt"
crate-type = ["cdylib", "rlib"]

syntax = "proto3";

package cfzt.common.v1;

import "google/protobuf/timestamp.proto";

message UUID {
  string value = 1;
}

message TenantID {
  string value = 1;
}

message SessionID {
  string value = 1;
}

message UserID {
  string value = 1;
}

message DeviceID {
  string value = 1;
}

message PaginationCursor {
  string token = 1;
  int32 page_size = 2;
}

message PaginationResponse {
  string next_cursor = 1;
  bool has_more = 2;
  int32 total_count = 3;
}

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_UNAUTHENTICATED = 1;
  ERROR_CODE_UNAUTHORIZED = 2;
  ERROR_CODE_NOT_FOUND = 3;
  ERROR_CODE_INVALID_ARGUMENT = 4;
  ERROR_CODE_RATE_LIMITED = 5;
  ERROR_CODE_INTERNAL = 6;
  ERROR_CODE_UNAVAILABLE = 7;
  ERROR_CODE_QUANTUM_BACKEND_UNAVAILABLE = 8;
  ERROR_CODE_ZK_PROOF_INVALID = 9;
  ERROR_CODE_PQC_KEY_ERROR = 10;
  ERROR_CODE_FACE_NOT_DETECTED = 11;
  ERROR_CODE_LIVENESS_FAILED = 12;
  ERROR_CODE_EMBEDDING_MISMATCH = 13;
}

message ErrorDetail {
  ErrorCode code = 1;
  string message = 2;
  map<string, string> metadata = 3;
}

message TimestampRange {
  google.protobuf.Timestamp start = 1;
  google.protobuf.Timestamp end = 2;
}
